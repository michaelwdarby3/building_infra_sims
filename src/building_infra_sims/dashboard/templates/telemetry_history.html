{% extends "base.html" %}
{% block title %}Telemetry History{% endblock %}

{% block extra_head %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
{% endblock %}

{% block content %}
<h2>Telemetry History</h2>
<p>Recent sensor readings from local simulators or gateway database.</p>

<div style="display: flex; gap: 1rem; align-items: center; margin-bottom: 1rem;">
    <fieldset role="group" style="margin: 0;">
        <button id="btn-local" class="outline" onclick="setSource('local')">Local</button>
        <button id="btn-gateway" class="outline" onclick="setSource('gateway')">Gateway</button>
        <button id="btn-auto" onclick="setSource('auto')">Auto</button>
    </fieldset>
    <label for="point-filter" style="margin: 0;">
        <input type="text" id="point-filter" placeholder="Filter by point name..." style="margin: 0;">
    </label>
    <small id="source-label" style="color: var(--pico-muted-color);"></small>
</div>

<canvas id="historyChart" style="max-height: 400px;"></canvas>

<details>
    <summary>Raw data table</summary>
    <div id="history-table"></div>
</details>

<script>
let chart = null;
let currentSource = 'auto';

function setSource(src) {
    currentSource = src;
    document.querySelectorAll('fieldset[role="group"] button').forEach(b => b.classList.add('outline'));
    document.getElementById('btn-' + src).classList.remove('outline');
    loadHistory();
}

async function loadHistory() {
    const resp = await fetch('/api/telemetry/history?source=' + currentSource);
    const data = await resp.json();
    const rows = data.rows;

    document.getElementById('source-label').textContent =
        data.count + ' rows from ' + data.source;

    if (!rows || rows.length === 0) {
        document.getElementById('history-table').innerHTML = '<p><em>No historical data yet.</em></p>';
        if (chart) { chart.destroy(); chart = null; }
        return;
    }

    // Build series grouped by device+point
    const series = {};
    for (const row of rows) {
        const name = (row.device ? row.device + ' / ' : '') + (row.point || row.name || 'unknown');
        if (!series[name]) series[name] = [];
        const ts = row.timestamp || row.time || 0;
        const val = parseFloat(row.value ?? row.data ?? 0);
        if (!isNaN(val)) {
            series[name].push({ x: ts, y: val });
        }
    }

    const colors = [
        '#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6',
        '#ec4899', '#06b6d4', '#84cc16', '#f97316', '#6366f1',
        '#14b8a6', '#e11d48', '#0ea5e9', '#a855f7', '#22c55e',
    ];

    const datasets = Object.entries(series).map(([name, points], i) => ({
        label: name,
        data: points.sort((a, b) => a.x - b.x),
        borderColor: colors[i % colors.length],
        backgroundColor: colors[i % colors.length] + '22',
        borderWidth: 1.5, pointRadius: 0, tension: 0.3,
    }));

    const ctx = document.getElementById('historyChart').getContext('2d');
    if (chart) chart.destroy();
    chart = new Chart(ctx, {
        type: 'line',
        data: { datasets },
        options: {
            responsive: true,
            interaction: { intersect: false, mode: 'index' },
            scales: {
                x: { type: 'linear', title: { display: true, text: 'Time (epoch)' } },
                y: { title: { display: true, text: 'Value' } },
            },
            plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } } },
        },
    });

    // Raw data table
    const columns = Object.keys(rows[0]);
    let html = '<table><thead><tr>';
    for (const col of columns) html += '<th>' + col + '</th>';
    html += '</tr></thead><tbody>';
    for (const row of rows.slice(0, 100)) {
        html += '<tr>';
        for (const col of columns) {
            let v = row[col] ?? '';
            if (typeof v === 'number' && !Number.isInteger(v)) v = v.toFixed(4);
            html += '<td>' + v + '</td>';
        }
        html += '</tr>';
    }
    html += '</tbody></table>';
    if (rows.length > 100) html += '<p><em>Showing 100 of ' + rows.length + ' rows</em></p>';
    document.getElementById('history-table').innerHTML = html;
}

document.getElementById('point-filter').addEventListener('input', function() {
    if (!chart) return;
    const filter = this.value.toLowerCase();
    chart.data.datasets.forEach(ds => { ds.hidden = filter && !ds.label.toLowerCase().includes(filter); });
    chart.update();
});

// Initial load and auto-refresh every 15s
loadHistory();
setInterval(loadHistory, 15000);
</script>
{% endblock %}
