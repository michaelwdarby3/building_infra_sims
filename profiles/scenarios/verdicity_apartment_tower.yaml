name: "Verdicity Apartment Tower"
description: |
  Verdicity-generated synthetic 8-story apartment tower used by the
  prototype's scanner_apartment mode. Single source of truth for the
  building topology (devices + spaces).

  Building shape:
    * Footprint 14m × 10m, 8 floors at 3.0m floor-height = 24m tall
    * Floor 1: Lobby + Mech Room (back-of-house ground floor)
    * Floors 2–7: 2 apartment units each (Unit-A on left, Unit-B on right)
    * Floor 8: 2 penthouse units
    * Roof: rooftop equipment deck above floor 8

  Same fleet of 10 simulated BACnet/Modbus devices as the demo office
  (FACP, fire pump, elevator, ASHPs, panels) — re-pinned to apartment
  spaces via the iri_map. The simulator scenario is interchangeable
  with cloudbimstorm_re1.yaml / verdicity_demo_office.yaml; only the
  iri_map binding the scanner reads differs.

  IRI scheme: every space is `:Space_VDCY_APT_<id>` and every component
  is `:Component_VDCY_APT_<id>` under `http://onuma.com/schema#`.

site:
  iri: ":Site_VDCY_APT_01"
  label: "Verdicity Apartment Site"
building:
  iri: ":Building_VDCY_APT_01"
  label: "Verdicity Apartment Tower"
floor:
  # Single floor IRI for the iri_map's top-level. Per-floor identity is
  # encoded in the per-space IRIs (`:Space_VDCY_APT_F<n>_*`); we'd need
  # a multi-floor scanner-export schema to lift each story to its own
  # `:Floor_*` IRI, which is out of scope here.
  iri: ":Floor_VDCY_APT_STACK"
  label: "Apartment Stack"

# Tower-wide constants — used both for the spatial layout below and as
# documentation. Floor-height is the slab-to-slab distance; ceiling-height
# (separate field below) is the vertical clearance inside a unit.
ceiling_height_m: 2.7

# ─── Spaces (rooms, stacked) ─────────────────────────────────────────────
# Coordinates: per-floor footprint is 14m wide (x) × 10m deep (y). Each
# space's polygon is in room-local meters; placement_x/y is the global
# in-floor offset; placement_z is the vertical floor offset (m). Floor 1
# at z=0, Floor 2 at z=3.0, ..., Floor 8 at z=21.0, Roof at z=24.0.
spaces:
  # ── Floor 1: Lobby + Mech Room ────────────────────────────────────
  - id: VDCY-APT-F1-LOBBY
    iri: ":Space_VDCY_APT_F1_LOBBY"
    name: "Floor 1 · Lobby"
    floor_index: 1
    area_m2: 80.0
    polygon:
      - {x: 0.0, y: 0.0}
      - {x: 8.0, y: 0.0}
      - {x: 8.0, y: 10.0}
      - {x: 0.0, y: 10.0}
    placement: {x: 0.0, y: 0.0, z: 0.0, angle: 0.0}

  - id: VDCY-APT-F1-MECH
    iri: ":Space_VDCY_APT_F1_MECH"
    name: "Floor 1 · Mechanical Room"
    floor_index: 1
    area_m2: 60.0
    polygon:
      - {x: 0.0, y: 0.0}
      - {x: 6.0, y: 0.0}
      - {x: 6.0, y: 10.0}
      - {x: 0.0, y: 10.0}
    placement: {x: 8.0, y: 0.0, z: 0.0, angle: 0.0}

  # ── Floor 2: 2 apartment units ────────────────────────────────────
  - id: VDCY-APT-F2-A
    iri: ":Space_VDCY_APT_F2_A"
    name: "Floor 2 · Unit A"
    floor_index: 2
    area_m2: 70.0
    polygon:
      - {x: 0.0, y: 0.0}
      - {x: 7.0, y: 0.0}
      - {x: 7.0, y: 10.0}
      - {x: 0.0, y: 10.0}
    placement: {x: 0.0, y: 0.0, z: 3.0, angle: 0.0}

  - id: VDCY-APT-F2-B
    iri: ":Space_VDCY_APT_F2_B"
    name: "Floor 2 · Unit B"
    floor_index: 2
    area_m2: 70.0
    polygon:
      - {x: 0.0, y: 0.0}
      - {x: 7.0, y: 0.0}
      - {x: 7.0, y: 10.0}
      - {x: 0.0, y: 10.0}
    placement: {x: 7.0, y: 0.0, z: 3.0, angle: 0.0}

  # ── Floor 3 ────────────────────────────────────────────────────────
  - id: VDCY-APT-F3-A
    iri: ":Space_VDCY_APT_F3_A"
    name: "Floor 3 · Unit A"
