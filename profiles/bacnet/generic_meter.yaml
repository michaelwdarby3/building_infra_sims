name: "Generic BACnet Power Meter"
description: "3-phase utility meter — small-office load profile (~7 kW peak, ~2 kW overnight base)"
equipment_class: "Electrical_Meter"
device_id: 3001
port: 47808

# Boston-region small office: annual intensity ~13 kWh/ft²/yr × ~5000 ft²
# ≈ 65 MWh/yr ≈ 7.4 kW average. Daytime peak ~9 kW, overnight base ~2 kW.
# Per DOE commercial reference building for an office in climate zone 5A.

objects:
  # ── Voltage (line-to-neutral, tight ±5% of 120V nominal) ──
  - object_type: analog-input
    instance: 1
    name: "Voltage Phase A"
    present_value: 120.1
    units: volts
    description: "Phase A line-to-neutral voltage"
    behavior:
      type: random_walk
      center: 120.0
      step_size: 0.5
      min: 117.0
      max: 123.0

  - object_type: analog-input
    instance: 2
    name: "Voltage Phase B"
    present_value: 120.0
    units: volts
    behavior:
      type: random_walk
      center: 120.0
      step_size: 0.5
      min: 117.0
      max: 123.0

  - object_type: analog-input
    instance: 3
    name: "Voltage Phase C"
    present_value: 119.9
    units: volts
    behavior:
      type: random_walk
      center: 120.0
      step_size: 0.5
      min: 117.0
      max: 123.0

  # ── Current per phase ──
  # Phased sine (period = 1 day) gives realistic daily envelope and keeps
  # the 120° electrical offset so A/B/C differ by several amps at any
  # given moment. Center 18A ≈ 6.5 kW per phase at 120V·0.92PF.
  - object_type: analog-input
    instance: 4
    name: "Current Phase A"
    present_value: 18.0
    units: amperes
    behavior:
      type: phased_sine_wave
      center: 18.0
      amplitude: 8.0
      period: 86400
      phase_offset: 0.0

  - object_type: analog-input
    instance: 5
    name: "Current Phase B"
    present_value: 17.5
    units: amperes
    behavior:
      type: phased_sine_wave
      center: 18.0
      amplitude: 8.0
      period: 86400
      phase_offset: 2.094

  - object_type: analog-input
    instance: 6
    name: "Current Phase C"
    present_value: 18.2
    units: amperes
    behavior:
      type: phased_sine_wave
      center: 18.0
      amplitude: 8.0
      period: 86400
      phase_offset: 4.189

  # ── Total real/reactive power ──
  # Driven by occupancy with a base load. kW = 2 (base) + 7·occ.
  - object_type: analog-input
    instance: 10
    name: "Total Real Power kW"
    present_value: 5.0
    units: kilowatts
    behavior:
      type: world_value
      signal: occupancy
      scale: 7.0
      offset: 2.0
      noise: 0.25
      min: 1.5
      max: 10.0

  - object_type: analog-input
    instance: 11
    name: "Total Reactive Power kVAR"
    present_value: 1.2
    units: kilovolt-amperes-reactive
    # Roughly 20% of real power, so PF ≈ 0.92.
    behavior:
      type: world_value
      signal: occupancy
      scale: 1.5
      offset: 0.5
      noise: 0.15
      min: 0.3
      max: 2.5

  - object_type: analog-input
    instance: 12
    name: "Power Factor"
    present_value: 0.92
    units: no-units
    # Typical commercial lagging PF. Narrow walk keeps it realistic.
    behavior:
      type: random_walk
      center: 0.92
      step_size: 0.01
      min: 0.85
      max: 0.98

  - object_type: analog-input
    instance: 13
    name: "Frequency"
    present_value: 60.0
    units: hertz
    behavior:
      type: random_walk
      center: 60.0
      step_size: 0.015
      min: 59.90
      max: 60.10

  # ── Energy (monotonic accumulator) ──
  # 7.2 kWh/hr average → 0.002 kWh/s. Starts at a believable lifetime
  # reading for a few years of service.
  - object_type: analog-input
    instance: 20
    name: "Total Energy kWh"
    present_value: 123456.0
    units: kilowatt-hours
    behavior:
      type: accumulator
      initial: 123456.0
      rate_per_second: 0.002

  # ── Device status ──
  - object_type: binary-input
    instance: 1
    name: "Meter Online"
    present_value: active
    description: "Meter communication status"
    behavior:
      type: binary_toggle
      on_duration: 86400
      off_duration: 60

  - object_type: multi-state-value
    instance: 1
    name: "Alarm Status"
    present_value: 1
    description: "1=Normal 2=Warning 3=Alarm"
    behavior:
      type: weighted_choice
      choices:
        - value: 1
          weight: 90
        - value: 2
          weight: 8
        - value: 3
          weight: 2
      hold_min: 1800
      hold_max: 7200
