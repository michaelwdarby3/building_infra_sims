name: "Generic VAV Box"
description: "Variable Air Volume terminal unit with reheat — follows world occupancy + heating demand"
equipment_class: "VAV"
device_id: 2001
port: 47808

objects:
  # ── Sensor Inputs ──
  - object_type: analog-input
    instance: 1
    name: "Zone Temperature"
    present_value: 72.0
    units: degrees-fahrenheit
    description: "Zone space temperature — tracks zone setpoint with small drift"
    behavior:
      type: tracks
      source: "Cooling Setpoint"
      bias: -1.0       # mid-deadband between heat/cool setpoints
      noise: 0.3
      lag_factor: 0.5

  - object_type: analog-input
    instance: 2
    name: "Discharge Air Temperature"
    present_value: 55.0
    units: degrees-fahrenheit
    description: "Air temperature leaving the VAV box"
    # In cooling season ≈55°F (AHU SAT pass-through), in heating reheats to ~95°F.
    behavior:
      type: conditional_on_oat
      bands:
        - oat_below: 45
          value: 90.0   # reheat fully engaged
        - oat_below: 60
          value: 70.0   # partial reheat
        - oat_below: 200
          value: 55.0   # cooling-only
      noise: 1.5

  - object_type: analog-input
    instance: 3
    name: "Airflow CFM"
    present_value: 400.0
    units: cubic-feet-per-minute
    description: "Measured airflow — follows cooling demand with a 200 CFM minimum floor"
    behavior:
      type: world_value
      signal: cooling_demand
      scale: 600.0
      offset: 200.0
      noise: 15.0
      min: 200.0
      max: 800.0

  # ── Commanded Outputs ──
  - object_type: analog-output
    instance: 1
    name: "Damper Position"
    present_value: 50.0
    units: percent
    description: "VAV damper position — follows cooling demand"
    behavior:
      type: world_value
      signal: cooling_demand
      scale: 75.0
      offset: 25.0     # 25% minimum ventilation position
      noise: 2.0
      min: 25.0
      max: 100.0

  - object_type: analog-output
    instance: 2
    name: "Reheat Valve Command"
    present_value: 0.0
    units: percent
    description: "Hot water reheat valve — follows heating demand"
    behavior:
      type: world_value
      signal: heating_demand
      scale: 100.0
      noise: 2.0
      min: 0.0
      max: 100.0

  # ── Setpoints & Config ──
  - object_type: analog-value
    instance: 1
    name: "Cooling Setpoint"
    present_value: 74.0
    units: degrees-fahrenheit
    description: "Zone cooling setpoint"
    behavior:
      type: static
      value: 74.0

  - object_type: analog-value
    instance: 2
    name: "Heating Setpoint"
    present_value: 70.0
    units: degrees-fahrenheit
    description: "Zone heating setpoint"
    behavior:
      type: static
      value: 70.0

  - object_type: analog-value
    instance: 3
    name: "Minimum Airflow Setpoint"
    present_value: 200.0
    units: cubic-feet-per-minute
    behavior:
      type: static
      value: 200.0

  - object_type: analog-value
    instance: 4
    name: "Maximum Airflow Setpoint"
    present_value: 800.0
    units: cubic-feet-per-minute
    behavior:
      type: static
      value: 800.0

  # ── Status ──
  - object_type: binary-input
    instance: 1
    name: "Occupancy Status"
    present_value: active
    description: "Zone occupancy — follows world schedule"
    behavior:
      type: occupancy_binary
      threshold: 0.1

  - object_type: binary-value
    instance: 1
    name: "Zone Override Active"
    present_value: inactive

  - object_type: multi-state-value
    instance: 1
    name: "Operating Mode"
    present_value: 2
    description: "1=Deadband 2=Cooling 3=Heating 4=Unoccupied"
