name: "Generic Fan Coil Unit"
description: "4-pipe fan coil — CHW follows cooling demand, HW follows heating demand"
equipment_class: "FCU"
device_id: 6101
port: 47808

objects:
  # ── Sensors ──
  - object_type: analog-input
    instance: 1
    name: "Room Temperature"
    present_value: 72.0
    units: degrees-fahrenheit
    # Room temp hovers near setpoint with a small drift.
    behavior:
      type: tracks
      source: "Cooling Setpoint"
      bias: -2.0
      noise: 0.4
      lag_factor: 0.5

  - object_type: analog-input
    instance: 2
    name: "Supply Air Temp"
    present_value: 58.0
    units: degrees-fahrenheit
    # Cooling-season 55°F, heating mode upper 80s (hot coil).
    behavior:
      type: conditional_on_oat
      bands:
        - oat_below: 45
          value: 88.0
        - oat_below: 60
          value: 68.0
        - oat_below: 200
          value: 56.0
      noise: 1.5

  - object_type: analog-input
    instance: 3
    name: "CHW Valve Feedback"
    present_value: 40.0
    units: percent
    behavior:
      type: world_value
      signal: cooling_demand
      scale: 100.0
      noise: 2.0
      min: 0.0
      max: 100.0

  - object_type: analog-input
    instance: 4
    name: "HW Valve Feedback"
    present_value: 0.0
    units: percent
    behavior:
      type: world_value
      signal: heating_demand
      scale: 100.0
      noise: 2.0
      min: 0.0
      max: 100.0

  # ── Commands ──
  - object_type: analog-output
    instance: 1
    name: "Fan Speed CMD"
    present_value: 75.0
    units: percent
    # Fan slows overnight, runs harder when occupied.
    behavior:
      type: world_value
      signal: occupancy
      scale: 60.0
      offset: 30.0
      noise: 2.0
      min: 30.0
      max: 100.0

  - object_type: analog-output
    instance: 2
    name: "CHW Valve CMD"
    present_value: 40.0
    units: percent
    behavior:
      type: world_value
      signal: cooling_demand
      scale: 100.0
      noise: 2.0
      min: 0.0
      max: 100.0

  - object_type: analog-output
    instance: 3
    name: "HW Valve CMD"
    present_value: 0.0
    units: percent
    behavior:
      type: world_value
      signal: heating_demand
      scale: 100.0
      noise: 2.0
      min: 0.0
      max: 100.0

  # ── Status ──
  - object_type: binary-input
    instance: 1
    name: "Fan Status"
    present_value: active
    behavior:
      type: occupancy_binary
      threshold: 0.05

  - object_type: binary-input
    instance: 2
    name: "Occupancy"
    present_value: active
    behavior:
      type: occupancy_binary
      threshold: 0.1

  - object_type: binary-input
    instance: 3
    name: "Window Contact"
    present_value: inactive
    description: "Closed = inactive, Open = active"
    behavior:
      type: binary_toggle
      on_duration: 1800
      off_duration: 14400

  # ── Setpoints ──
  - object_type: analog-value
    instance: 1
    name: "Cooling Setpoint"
    present_value: 74.0
    units: degrees-fahrenheit
    behavior:
      type: static
      value: 74.0

  - object_type: analog-value
    instance: 2
    name: "Heating Setpoint"
    present_value: 68.0
    units: degrees-fahrenheit
    behavior:
      type: static
      value: 68.0

  # ── Mode ──
  - object_type: multi-state-value
    instance: 1
    name: "Fan Speed Mode"
    present_value: 4
    description: "1=Off 2=Low 3=Med 4=High 5=Auto"
    behavior:
      type: weighted_choice
      choices:
        - value: 5
          weight: 40
        - value: 3
          weight: 25
        - value: 4
          weight: 15
        - value: 2
          weight: 12
        - value: 1
          weight: 8
      hold_min: 600
      hold_max: 1800

  - object_type: multi-state-value
    instance: 2
    name: "Operating Mode"
    present_value: 2
    description: "1=Off 2=Cool 3=Heat 4=Auto"
    behavior:
      type: weighted_choice
      choices:
        - value: 4
          weight: 40
        - value: 2
          weight: 30
        - value: 3
          weight: 20
        - value: 1
          weight: 10
      hold_min: 900
      hold_max: 3600
