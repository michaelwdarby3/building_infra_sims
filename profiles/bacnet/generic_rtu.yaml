name: "Generic Rooftop Unit"
description: "Packaged rooftop unit with DX cooling, gas heat, and economizer — Boston climate"
equipment_class: "AHU"
device_id: 6001
port: 47808

objects:
  # ── Temperature sensors ──
  - object_type: analog-input
    instance: 1
    name: "Supply Air Temp"
    present_value: 55.0
    units: degrees-fahrenheit
    # Cooling season SAT ~55°F; heating season mid-70s at discharge.
    behavior:
      type: conditional_on_oat
      bands:
        - oat_below: 30
          value: 75.0
        - oat_below: 55
          value: 65.0
        - oat_below: 200
          value: 55.0
      noise: 1.5

  - object_type: analog-input
    instance: 2
    name: "Return Air Temp"
    present_value: 74.0
    units: degrees-fahrenheit
    # Return plenum ~2°F above zone.
    behavior:
      type: tracks
      source: "Cooling Setpoint"
      bias: -1.0
      noise: 0.4
      lag_factor: 0.5

  - object_type: analog-input
    instance: 3
    name: "Outside Air Temp"
    present_value: 55.0
    units: degrees-fahrenheit
    behavior:
      type: world_value
      signal: oat
      noise: 0.5

  - object_type: analog-input
    instance: 4
    name: "Mixed Air Temp"
    present_value: 68.0
    units: degrees-fahrenheit
    behavior:
      type: mixed_air
      damper_source: "OA Damper CMD"
      return_air_source: "Return Air Temp"
      noise: 0.4

  - object_type: analog-input
    instance: 5
    name: "Discharge Air Temp"
    present_value: 54.0
    units: degrees-fahrenheit
    behavior:
      type: tracks
      source: "Supply Air Temp"
      bias: -1.0
      noise: 0.5
      lag_factor: 0.3

  # ── Commands ──
  - object_type: analog-output
    instance: 1
    name: "Cooling Stage CMD"
    present_value: 1.0
    units: no-units
    # 0=off, 1=stage1, 2=stage2. Ramp with cooling_demand.
    behavior:
      type: world_value
      signal: cooling_demand
      scale: 2.0
      offset: 0.0
      noise: 0.05
      min: 0.0
      max: 2.0

  - object_type: analog-output
    instance: 2
    name: "Heating CMD"
    present_value: 0.0
    units: percent
    behavior:
      type: world_value
      signal: heating_demand
      scale: 100.0
      noise: 2.0
      min: 0.0
      max: 100.0

  - object_type: analog-output
    instance: 3
    name: "OA Damper CMD"
    present_value: 25.0
    units: percent
    # Same G36 economizer bands as AHU.
    behavior:
      type: conditional_on_oat
      bands:
        - oat_below: 50
          value: 25
        - oat_below: 65
          value: 80
        - oat_below: 200
          value: 25
      noise: 2.0

  - object_type: analog-output
    instance: 4
    name: "Supply Fan Speed CMD"
    present_value: 75.0
    units: percent
    # Fan slows off-hours; always on when occupied.
    behavior:
      type: world_value
      signal: occupancy
      scale: 60.0
      offset: 30.0
      noise: 2.0
      min: 30.0
      max: 100.0

  # ── Status ──
  - object_type: binary-input
    instance: 1
    name: "Supply Fan Status"
    present_value: active
    behavior:
      type: occupancy_binary
      threshold: 0.05

  - object_type: binary-input
    instance: 2
    name: "Compressor 1 Status"
    present_value: active
    # Stage-1 compressor runs whenever there's meaningful cooling demand.
    behavior:
      type: binary_toggle
      on_duration: 900
      off_duration: 300

  - object_type: binary-input
    instance: 3
    name: "Compressor 2 Status"
    present_value: inactive
    behavior:
      type: binary_toggle
      on_duration: 600
      off_duration: 600

  - object_type: binary-input
    instance: 4
    name: "Economizer Active"
    present_value: inactive
    behavior:
      type: binary_toggle
      on_duration: 300
      off_duration: 900

  # ── Setpoints ──
  - object_type: analog-value
    instance: 1
    name: "Cooling Setpoint"
    present_value: 74.0
    units: degrees-fahrenheit
    behavior:
      type: static
      value: 74.0

  - object_type: analog-value
    instance: 2
    name: "Heating Setpoint"
    present_value: 68.0
    units: degrees-fahrenheit
    behavior:
      type: static
      value: 68.0

  - object_type: analog-value
    instance: 3
    name: "Economizer Changeover Temp"
    present_value: 65.0
    units: degrees-fahrenheit
    behavior:
      type: static
      value: 65.0

  # ── Mode ──
  - object_type: multi-state-value
    instance: 1
    name: "Operating Mode"
    present_value: 3
    description: "1=Off 2=Cool1 3=Cool2 4=Heat 5=Econ 6=Auto"
    behavior:
      type: weighted_choice
      choices:
        - value: 6
          weight: 35
        - value: 2
          weight: 20
        - value: 3
          weight: 15
        - value: 4
          weight: 15
        - value: 5
          weight: 10
        - value: 1
          weight: 5
      hold_min: 600
      hold_max: 1800
