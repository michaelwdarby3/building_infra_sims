name: "Generic Fire Alarm Panel"
description: "8-zone fire alarm panel with trouble and supervisory monitoring"
device_id: 9001
port: 47808

objects:
  # ── Zone alarm states ──
  - object_type: binary-input
    instance: 1
    name: "Zone 1 Alarm"
    present_value: inactive

  - object_type: binary-input
    instance: 2
    name: "Zone 2 Alarm"
    present_value: inactive

  - object_type: binary-input
    instance: 3
    name: "Zone 3 Alarm"
    present_value: inactive

  - object_type: binary-input
    instance: 4
    name: "Zone 4 Alarm"
    present_value: inactive

  - object_type: binary-input
    instance: 5
    name: "Zone 5 Alarm"
    present_value: inactive

  - object_type: binary-input
    instance: 6
    name: "Zone 6 Alarm"
    present_value: inactive

  - object_type: binary-input
    instance: 7
    name: "Zone 7 Alarm"
    present_value: inactive

  - object_type: binary-input
    instance: 8
    name: "Zone 8 Alarm"
    present_value: inactive

  # ── System status ──
  - object_type: binary-input
    instance: 10
    name: "Trouble Condition"
    present_value: inactive

  - object_type: binary-input
    instance: 11
    name: "Supervisory Condition"
    present_value: inactive

  - object_type: analog-value
    instance: 1
    name: "Active Alarm Count"
    present_value: 0.0
    units: no-units

  - object_type: multi-state-value
    instance: 1
    name: "Panel Status"
    present_value: 1
    description: "1=Normal 2=Alarm 3=Trouble 4=Supervisory 5=Silenced"
