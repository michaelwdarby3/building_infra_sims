name: "Generic Heat Pump"
description: "Air-source heat pump — source side reads world OAT, load side tracks setpoint"
equipment_class: "Heat_Pump"
device_id: 7101
port: 47808

# Air-source heat pump in Boston. Source side is outdoor air (uses OAT with
# small depression for evaporator/condenser exchange). Load side is a
# hydronic buffer tank at ~110°F. COP drops with colder OAT (~3.5 mild, ~2.2
# design winter).

objects:
  # ── Source side (outdoor coil) ──
  - object_type: analog-input
    instance: 1
    name: "Source Entering Temp"
    present_value: 50.0
    units: degrees-fahrenheit
    # Outdoor air entering the evaporator.
    behavior:
      type: world_value
      signal: oat
      noise: 0.5

  - object_type: analog-input
    instance: 2
    name: "Source Leaving Temp"
    present_value: 42.0
    units: degrees-fahrenheit
    # ~8°F cooler than source entering after heat extraction.
    behavior:
      type: world_value
      signal: oat
      offset: -8.0
      noise: 0.6

  # ── Load side (indoor buffer tank) ──
  - object_type: analog-input
    instance: 3
    name: "Load Entering Temp"
    present_value: 95.0
    units: degrees-fahrenheit
    # Return from the load loop.
    behavior:
      type: tracks
      source: "Setpoint"
      bias: -15.0
      noise: 0.8
      lag_factor: 0.4

  - object_type: analog-input
    instance: 4
    name: "Load Leaving Temp"
    present_value: 110.0
    units: degrees-fahrenheit
    behavior:
      type: tracks
      source: "Setpoint"
      bias: 0.0
      noise: 0.6
      lag_factor: 0.3

  # ── Performance ──
  - object_type: analog-value
    instance: 1
    name: "COP"
    present_value: 3.5
    units: no-units
    # COP drops linearly with OAT: ~4.0 at 50°F, ~2.2 at 0°F.
    behavior:
      type: conditional_on_oat
      bands:
        - oat_below: 10
          value: 2.2
        - oat_below: 30
          value: 2.7
        - oat_below: 50
          value: 3.5
        - oat_below: 200
          value: 4.0
      noise: 0.1

  - object_type: analog-value
    instance: 2
    name: "Setpoint"
    present_value: 110.0
    units: degrees-fahrenheit
    behavior:
      type: static
      value: 110.0

  - object_type: analog-value
    instance: 3
    name: "Runtime Hours"
    present_value: 8500.0
    units: no-units
    behavior:
      type: accumulator
      initial: 8500.0
      rate_per_second: 0.000278

  - object_type: analog-input
    instance: 10
    name: "Compressor Power"
    present_value: 12.5
    units: kilowatts
    # Compressor draws more power as heating demand rises.
    behavior:
      type: world_value
      signal: heating_demand
      scale: 15.0
      offset: 3.0
      noise: 0.5
      min: 1.5
      max: 20.0

  # ── Status/Control ──
  - object_type: binary-input
    instance: 1
    name: "Compressor Running"
    present_value: active
    behavior:
      type: binary_toggle
      on_duration: 2400
      off_duration: 600

  - object_type: binary-value
    instance: 1
    name: "Reversing Valve"
    present_value: active
    description: "active=Heating inactive=Cooling"
    behavior:
      type: binary_toggle
      on_duration: 3600
      off_duration: 3600

  - object_type: multi-state-value
    instance: 1
    name: "Defrost Mode"
    present_value: 1
    description: "1=Normal 2=Defrost 3=Recovery"
    behavior:
      type: weighted_choice
      choices:
        - value: 1
          weight: 85
        - value: 2
          weight: 10
        - value: 3
          weight: 5
      hold_min: 600
      hold_max: 2400

  - object_type: multi-state-value
    instance: 2
    name: "Operating Mode"
    present_value: 2
    description: "1=Off 2=Heating 3=Cooling 4=Standby 5=Lockout"
    behavior:
      type: weighted_choice
      choices:
        - value: 2
          weight: 40
        - value: 3
          weight: 35
        - value: 4
          weight: 12
        - value: 1
          weight: 10
        - value: 5
          weight: 3
      hold_min: 900
      hold_max: 3600
