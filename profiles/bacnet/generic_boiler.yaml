name: "Generic Boiler"
description: "Hot water boiler — OAT-reset supply temp, firing rate tracks heating demand"
equipment_class: "Boiler"
device_id: 4001
port: 47808

# Calibrated for a Boston shoulder/winter load. OAT-reset curve (ASHRAE G36 §5.18):
# design at 0°F OAT → 180°F supply, 60°F OAT → 140°F supply, linear in between.
# Return is 20°F cooler (typical 20-degree ΔT loop).

objects:
  # ── Temperature sensors ──
  - object_type: analog-input
    instance: 1
    name: "Supply Water Temperature"
    present_value: 160.0
    units: degrees-fahrenheit
    behavior:
      type: tracks
      source: "Supply Setpoint"
      bias: 0.0
      noise: 1.0
      lag_factor: 0.3

  - object_type: analog-input
    instance: 2
    name: "Return Water Temperature"
    present_value: 140.0
    units: degrees-fahrenheit
    # 20°F loop ΔT.
    behavior:
      type: tracks
      source: "Supply Setpoint"
      bias: -20.0
      noise: 1.2
      lag_factor: 0.4

  - object_type: analog-input
    instance: 3
    name: "Flue Gas Temperature"
    present_value: 350.0
    units: degrees-fahrenheit
    # Stack temp tracks firing rate loosely — 250°F at low fire, 450°F at high fire.
    behavior:
      type: world_value
      signal: heating_demand
      scale: 200.0
      offset: 250.0
      noise: 8.0
      min: 220.0
      max: 480.0

  - object_type: analog-input
    instance: 4
    name: "Inlet Water Pressure"
    present_value: 15.0
    units: pounds-per-square-inch
    behavior:
      type: random_walk
      center: 15.0
      step_size: 0.3
      min: 12.0
      max: 18.0

  # ── Commands ──
  - object_type: binary-output
    instance: 1
    name: "Boiler Enable"
    present_value: active
    description: "Boiler enable/disable command"

  - object_type: analog-output
    instance: 1
    name: "Firing Rate Command"
    present_value: 50.0
    units: percent
    description: "Boiler firing rate — follows heating demand"
    behavior:
      type: world_value
      signal: heating_demand
      scale: 100.0
      noise: 2.0
      min: 0.0
      max: 100.0

  # ── Setpoints ──
  - object_type: analog-value
    instance: 1
    name: "Supply Setpoint"
    present_value: 160.0
    units: degrees-fahrenheit
    # G36 OAT-reset curve.
    behavior:
      type: conditional_on_oat
      bands:
        - oat_below: 10
          value: 180
        - oat_below: 30
          value: 170
        - oat_below: 50
          value: 155
        - oat_below: 200
          value: 140
      noise: 0.5

  - object_type: analog-value
    instance: 2
    name: "High Limit Cutout"
    present_value: 200.0
    units: degrees-fahrenheit
    behavior:
      type: static
      value: 200.0

  # ── Status ──
  - object_type: binary-input
    instance: 1
    name: "Flame Status"
    present_value: active
    description: "Flame proved"
    behavior:
      type: binary_toggle
      on_duration: 600
      off_duration: 60

  - object_type: binary-input
    instance: 2
    name: "Pump Status"
    present_value: active
    description: "Circulating pump running"
    behavior:
      type: binary_toggle
      on_duration: 3000
      off_duration: 300

  - object_type: binary-value
    instance: 1
    name: "Lockout Alarm"
    present_value: inactive
    description: "Boiler safety lockout"
    behavior:
      type: binary_toggle
      on_duration: 120
      off_duration: 43200

  - object_type: multi-state-value
    instance: 1
    name: "Operating Stage"
    present_value: 2
    description: "1=Off 2=Low Fire 3=High Fire 4=Lockout"
    behavior:
      type: weighted_choice
      choices:
        - value: 2
          weight: 50
        - value: 3
          weight: 30
        - value: 1
          weight: 18
        - value: 4
          weight: 2
      hold_min: 600
      hold_max: 2400
