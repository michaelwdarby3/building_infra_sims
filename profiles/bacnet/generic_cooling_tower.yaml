name: "Generic Cooling Tower"
description: "Induced-draft cooling tower — fan speed tracks cooling demand, wet bulb world-driven"
equipment_class: "Cooling_Tower"
device_id: 7001
port: 47808

# Tower basin rejects heat to ambient via evaporation. Basin temp sits
# 7–10°F above wet bulb (the "approach"). Fan modulates to hold a
# condenser-water leaving setpoint, so fan speed rises with cooling load.

objects:
  # ── Temperatures ──
  - object_type: analog-input
    instance: 1
    name: "Basin Water Temp"
    present_value: 82.0
    units: degrees-fahrenheit
    # Basin temp follows cooling demand and wet bulb proxy (OAT).
    behavior:
      type: world_value
      signal: cooling_demand
      scale: 12.0
      offset: 74.0
      noise: 0.8
      min: 72.0
      max: 95.0

  - object_type: analog-input
    instance: 2
    name: "Approach Temp"
    present_value: 7.0
    units: degrees-fahrenheit
    # Approach narrows as fan speed increases — small random walk is fine.
    behavior:
      type: random_walk
      center: 7.0
      step_size: 0.5
      min: 4.0
      max: 12.0

  - object_type: analog-input
    instance: 3
    name: "Wet Bulb Temp"
    present_value: 65.0
    units: degrees-fahrenheit
    # Wet bulb approximation: OAT - typical depression (~5-10°F summer).
    behavior:
      type: world_value
      signal: oat
      scale: 0.95
      offset: -5.0
      noise: 0.5
      min: 20.0
      max: 80.0

  # ── Water quality ──
  - object_type: analog-input
    instance: 10
    name: "Conductivity"
    present_value: 1200.0
    units: no-units
    description: "Microsiemens/cm"
    behavior:
      type: random_walk
      center: 1200.0
      step_size: 30.0
      min: 800.0
      max: 1800.0

  - object_type: analog-input
    instance: 11
    name: "pH Level"
    present_value: 7.2
    units: no-units
    behavior:
      type: random_walk
      center: 7.2
      step_size: 0.08
      min: 6.5
      max: 8.5

  - object_type: analog-input
    instance: 12
    name: "Vibration Level"
    present_value: 0.15
    units: no-units
    description: "Inches per second"
    behavior:
      type: random_walk
      center: 0.15
      step_size: 0.03
      min: 0.05
      max: 0.40

  # ── Fan control ──
  - object_type: analog-output
    instance: 1
    name: "Fan Speed Cmd"
    present_value: 75.0
    units: percent
    description: "VFD speed command — follows cooling demand"
    behavior:
      type: world_value
      signal: cooling_demand
      scale: 100.0
      offset: 0.0
      noise: 2.0
      min: 0.0
      max: 100.0

  - object_type: binary-output
    instance: 1
    name: "Makeup Valve Cmd"
    present_value: active
    description: "Basin fill valve"

  - object_type: binary-output
    instance: 2
    name: "Blowdown Valve Cmd"
    present_value: inactive
    description: "Water quality blowdown"

  # ── Status ──
  - object_type: binary-input
    instance: 1
    name: "Fan Running"
    present_value: active
    behavior:
      type: binary_toggle
      on_duration: 1800
      off_duration: 300

  - object_type: binary-input
    instance: 2
    name: "Low Water Level"
    present_value: inactive
    behavior:
      type: binary_toggle
      on_duration: 180
      off_duration: 28800

  - object_type: multi-state-value
    instance: 1
    name: "Operating Mode"
    present_value: 2
    description: "1=Off 2=Running 3=Winterized 4=Alarm"
    behavior:
      type: weighted_choice
      choices:
        - value: 2
          weight: 70
        - value: 1
          weight: 20
        - value: 3
          weight: 8
        - value: 4
          weight: 2
      hold_min: 900
      hold_max: 3600
