name: "Generic Chiller"
description: "Water-cooled chiller — CHW ΔT loop, compressor current tracks cooling demand"
equipment_class: "Chiller"
device_id: 5001
port: 47808

# Chilled water: 44°F supply, 54°F return (10°F ΔT, typical for comfort cooling).
# Condenser water: 85°F supply, 95°F return (10°F ΔT lifted by cooling tower).
# Compressor current ~200A at full load, ~40A at unloaded. Boston climate means
# the chiller cycles heavily in summer, near-idle in winter.

objects:
  # ── Chilled water ──
  - object_type: analog-input
    instance: 1
    name: "Chilled Water Supply Temp"
    present_value: 44.0
    units: degrees-fahrenheit
    behavior:
      type: tracks
      source: "Chilled Water Setpoint"
      bias: 0.0
      noise: 0.4
      lag_factor: 0.3

  - object_type: analog-input
    instance: 2
    name: "Chilled Water Return Temp"
    present_value: 54.0
    units: degrees-fahrenheit
    # Return is supply + 10°F ΔT — tracks supply so return > supply every step.
    behavior:
      type: tracks
      source: "Chilled Water Setpoint"
      bias: 10.0
      noise: 0.4
      lag_factor: 0.4

  # ── Condenser water ──
  - object_type: analog-input
    instance: 3
    name: "Condenser Water Supply Temp"
    present_value: 85.0
    units: degrees-fahrenheit
    # Condenser supply from cooling tower — follows cooling_demand + OAT influence.
    behavior:
      type: world_value
      signal: cooling_demand
      scale: 10.0
      offset: 78.0
      noise: 0.8
      min: 75.0
      max: 95.0

  - object_type: analog-input
    instance: 4
    name: "Condenser Water Return Temp"
    present_value: 95.0
    units: degrees-fahrenheit
    # Return = supply + 10°F lift across evaporator/compressor heat-of-rejection.
    behavior:
      type: tracks
      source: "Condenser Water Supply Temp"
      bias: 10.0
      noise: 0.5
      lag_factor: 0.3

  # ── Performance ──
  - object_type: analog-input
    instance: 10
    name: "Compressor Current"
    present_value: 120.0
    units: amperes
    # 40A idle + up to 160A at full cooling demand.
    behavior:
      type: world_value
      signal: cooling_demand
      scale: 160.0
      offset: 40.0
      noise: 5.0
      min: 40.0
      max: 200.0

  - object_type: analog-input
    instance: 11
    name: "Evaporator Pressure"
    present_value: 62.0
    units: pounds-per-square-inch
    behavior:
      type: random_walk
      center: 62.0
      step_size: 1.5
      min: 55.0
      max: 70.0

  - object_type: analog-input
    instance: 12
    name: "Condenser Pressure"
    present_value: 180.0
    units: pounds-per-square-inch
    # Condenser pressure rises with cooling demand.
    behavior:
      type: world_value
      signal: cooling_demand
      scale: 50.0
      offset: 155.0
      noise: 3.0
      min: 150.0
      max: 215.0

  - object_type: analog-input
    instance: 13
    name: "Capacity Percent"
    present_value: 65.0
    units: percent
    behavior:
      type: world_value
      signal: cooling_demand
      scale: 100.0
      offset: 0.0
      noise: 2.0
      min: 0.0
      max: 100.0

  # ── Commands ──
  - object_type: binary-output
    instance: 1
    name: "Chiller Enable"
    present_value: active
    description: "Chiller start/stop"

  - object_type: analog-output
    instance: 1
    name: "Chilled Water Setpoint Cmd"
    present_value: 44.0
    units: degrees-fahrenheit
    description: "Remote chilled water setpoint"

  - object_type: analog-output
    instance: 2
    name: "Demand Limit Cmd"
    present_value: 100.0
    units: percent
    description: "Demand limit percentage"

  # ── Setpoints ──
  - object_type: analog-value
    instance: 1
    name: "Chilled Water Setpoint"
    present_value: 44.0
    units: degrees-fahrenheit
    # G36 CHW reset: 44°F hot weather, up to 50°F cool weather to save energy.
    behavior:
      type: conditional_on_oat
      bands:
        - oat_below: 55
          value: 50.0
        - oat_below: 75
          value: 46.0
        - oat_below: 200
          value: 44.0
      noise: 0.2

  - object_type: analog-value
    instance: 2
    name: "Demand Limit"
    present_value: 100.0
    units: percent
    behavior:
      type: static
      value: 100.0

  # ── Status ──
  - object_type: binary-input
    instance: 1
    name: "Compressor Running"
    present_value: active
    behavior:
      type: binary_toggle
      on_duration: 1800
      off_duration: 300

  - object_type: binary-input
    instance: 2
    name: "Chilled Water Flow"
    present_value: active
    behavior:
      type: binary_toggle
      on_duration: 1800
      off_duration: 300

  - object_type: binary-value
    instance: 1
    name: "General Alarm"
    present_value: inactive
    behavior:
      type: binary_toggle
      on_duration: 120
      off_duration: 43200

  - object_type: multi-state-value
    instance: 1
    name: "Operating Mode"
    present_value: 2
    description: "1=Off 2=Running 3=Pumpdown 4=Lockout 5=Standby"
    behavior:
      type: weighted_choice
      choices:
        - value: 2
          weight: 60
        - value: 5
          weight: 15
        - value: 1
          weight: 15
        - value: 3
          weight: 8
        - value: 4
          weight: 2
      hold_min: 900
      hold_max: 3600
