name: "Generic Domestic Hot Water"
description: "DHW system with storage tank, burner, and recirc pump — cold-water inlet tracks season"
equipment_class: "Hot_Water_System"
device_id: 6201
port: 47808

# Tank upper 135°F, lower 120°F (stratified). Recirc loop: 130°F supply,
# 110°F return. Cold-water main in Boston varies 45–60°F seasonally — tied
# loosely to OAT with heavy damping. Flow rate follows occupancy.

objects:
  # ── Temperature sensors ──
  - object_type: analog-input
    instance: 1
    name: "Tank Temp Upper"
    present_value: 135.0
    units: degrees-fahrenheit
    behavior:
      type: tracks
      source: "Setpoint"
      bias: 5.0
      noise: 0.8
      lag_factor: 0.6

  - object_type: analog-input
    instance: 2
    name: "Tank Temp Lower"
    present_value: 120.0
    units: degrees-fahrenheit
    # 10°F stratified below upper.
    behavior:
      type: tracks
      source: "Setpoint"
      bias: -10.0
      noise: 1.2
      lag_factor: 0.7

  - object_type: analog-input
    instance: 3
    name: "Supply Temp"
    present_value: 130.0
    units: degrees-fahrenheit
    behavior:
      type: tracks
      source: "Setpoint"
      bias: 0.0
      noise: 0.6
      lag_factor: 0.3

  - object_type: analog-input
    instance: 4
    name: "Return Temp"
    present_value: 110.0
    units: degrees-fahrenheit
    # 20°F loop drop through fixtures.
    behavior:
      type: tracks
      source: "Setpoint"
      bias: -20.0
      noise: 0.8
      lag_factor: 0.4

  - object_type: analog-input
    instance: 5
    name: "Inlet Cold Water Temp"
    present_value: 55.0
    units: degrees-fahrenheit
    # Boston main-water temp varies with season — roughly 45°F winter,
    # 60°F summer. Use damped OAT as a proxy, with heavy ground attenuation.
    behavior:
      type: world_value
      signal: oat
      scale: 0.25
      offset: 40.0
      noise: 0.5
      min: 40.0
      max: 68.0

  - object_type: analog-input
    instance: 6
    name: "Flow Rate"
    present_value: 5.0
    units: gallons-per-minute
    # DHW demand follows occupancy (offices: morning/lunch/afternoon use).
    behavior:
      type: world_value
      signal: occupancy
      scale: 8.0
      offset: 1.0
      noise: 1.0
      min: 0.5
      max: 15.0

  # ── Commands ──
  - object_type: analog-output
    instance: 1
    name: "Burner CMD"
    present_value: 50.0
    units: percent
    # Burner fires harder when tank loses heat (occupied-hour draws).
    behavior:
      type: world_value
      signal: occupancy
      scale: 60.0
      offset: 15.0
      noise: 3.0
      min: 10.0
      max: 100.0

  - object_type: analog-output
    instance: 2
    name: "Recirc Pump CMD"
    present_value: 100.0
    units: percent

  # ── Status ──
  - object_type: binary-input
    instance: 1
    name: "Burner Status"
    present_value: active
    behavior:
      type: binary_toggle
      on_duration: 900
      off_duration: 300

  - object_type: binary-input
    instance: 2
    name: "Recirc Pump Status"
    present_value: active
    behavior:
      type: binary_toggle
      on_duration: 3600
      off_duration: 300

  - object_type: binary-input
    instance: 3
    name: "High Limit Alarm"
    present_value: inactive
    behavior:
      type: binary_toggle
      on_duration: 60
      off_duration: 43200

  - object_type: binary-input
    instance: 4
    name: "Low Temp Alarm"
    present_value: inactive
    behavior:
      type: binary_toggle
      on_duration: 120
      off_duration: 28800

  # ── Setpoints ──
  - object_type: analog-value
    instance: 1
    name: "Setpoint"
    present_value: 130.0
    units: degrees-fahrenheit
    behavior:
      type: static
      value: 130.0

  - object_type: analog-value
    instance: 2
    name: "High Limit"
    present_value: 160.0
    units: degrees-fahrenheit
    behavior:
      type: static
      value: 160.0

  # ── Mode ──
  - object_type: multi-state-value
    instance: 1
    name: "Operating Mode"
    present_value: 3
    description: "1=Off 2=Standby 3=Heating 4=Maintaining"
    behavior:
      type: weighted_choice
      choices:
        - value: 4
          weight: 40
        - value: 3
          weight: 35
        - value: 2
          weight: 15
        - value: 1
          weight: 10
      hold_min: 300
      hold_max: 1200
