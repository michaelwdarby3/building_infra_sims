name: "Generic AHU"
description: "Air Handling Unit — VAV, central, ~20,000 CFM design. Boston climate-driven."
equipment_class: "AHU"
vendor_name: "SimulatedHVAC"

# Values driven by shared WorldState (Boston climate + DOE medium-office
# occupancy schedule). See docs/realistic_values_research.md for source
# calibration against ASHRAE Guideline 36 and DOE prototype.

objects:
  # --- Temperature Sensors ---
  - type: analog-input
    instance: 1
    name: "Mixed Air Temp"
    units: degrees-fahrenheit
    initial_value: 68.0
    behavior:
      type: mixed_air
      damper_source: "Outside Air Damper CMD"
      return_air_source: "Return Air Temp"
      noise: 0.4

  - type: analog-input
    instance: 2
    name: "Supply Air Temp"
    units: degrees-fahrenheit
    initial_value: 55.0
    behavior:
      type: tracks
      source: "Supply Air Temp Setpoint"
      noise: 0.3
      lag_factor: 0.4   # couple-minute thermal lag on the coil leaving-air sensor

  - type: analog-input
    instance: 3
    name: "Return Air Temp"
    units: degrees-fahrenheit
    initial_value: 72.0
    behavior:
      type: tracks
      source: "Zone Temp Setpoint"
      bias: 1.5   # return plenum pickup, ~1.5°F above zone
      noise: 0.25
      lag_factor: 0.5

  - type: analog-input
    instance: 4
    name: "Outside Air Temp"
    units: degrees-fahrenheit
    initial_value: 40.0
    behavior:
      type: world_value
      signal: oat
      noise: 0.5

  - type: analog-input
    instance: 5
    name: "Supply Air Pressure"
    units: inches-of-water
    initial_value: 1.5
    # G36 duct SP reset between 0.5–2.5 inWC, tracking airflow demand.
    # Proxy: scale cooling_demand (which rises with OAT+occupancy).
    behavior:
      type: world_value
      signal: cooling_demand
      scale: 1.3
      offset: 0.7
      noise: 0.08
      min: 0.3
      max: 2.5

  # --- Valve Commands ---
  - type: analog-output
    instance: 1
    name: "Cooling Valve CMD"
    units: percent
    initial_value: 0.0
    behavior:
      type: world_value
      signal: cooling_demand
      scale: 100.0
      noise: 1.0
      min: 0.0
      max: 100.0

  - type: analog-output
    instance: 2
    name: "Heating Valve CMD"
    units: percent
    initial_value: 0.0
    behavior:
      type: world_value
      signal: heating_demand
      scale: 100.0
      noise: 1.0
      min: 0.0
      max: 100.0

  - type: analog-output
    instance: 3
    name: "Outside Air Damper CMD"
    units: percent
    initial_value: 20.0
    # Economizer sequence per G36: 20% min OA when OAT outside 50–65°F band,
    # up to 80% when OAT is in the free-cooling range.
    behavior:
      type: conditional_on_oat
      bands:
        - oat_below: 50
          value: 20     # cold — min OA only
        - oat_below: 65
          value: 80     # economizer range
        - oat_below: 200
          value: 20     # warm — back to min OA
      noise: 2.0

  # --- Fan Status ---
  - type: binary-input
    instance: 1
    name: "Supply Fan Status"
    initial_value: active
    behavior:
      type: occupancy_binary
      threshold: 0.05

  - type: binary-input
    instance: 2
    name: "Return Fan Status"
    initial_value: active
    behavior:
      type: occupancy_binary
      threshold: 0.05

  # --- Fan Commands ---
  - type: binary-output
    instance: 1
    name: "Supply Fan CMD"
    initial_value: active

  - type: binary-output
    instance: 2
    name: "Return Fan CMD"
    initial_value: active

  # --- Setpoints and Values ---
  - type: analog-value
    instance: 1
    name: "Supply Air Temp Setpoint"
    units: degrees-fahrenheit
    initial_value: 55.0
    # G36 SAT reset: pin at 55°F during cooling, let it rise with reheat demand
    # in shoulder/winter. Upper bound 65°F per G36 §5.16.
    behavior:
      type: conditional_on_oat
      bands:
        - oat_below: 30
          value: 65     # coldest — let zones call for reheat
        - oat_below: 55
          value: 60     # mild
        - oat_below: 200
          value: 55     # hot — pure cooling
      noise: 0.2

  - type: analog-value
    instance: 2
    name: "Zone Temp Setpoint"
    units: degrees-fahrenheit
    initial_value: 72.0
    # Static for now — a per-zone scheduler is future work.
    behavior:
      type: static
      value: 72.0

  - type: analog-value
    instance: 3
    name: "Min Outside Air Setpoint"
    units: percent
    initial_value: 20.0
    behavior:
      type: static
      value: 20.0

  # --- Alarms ---
  - type: binary-value
    instance: 1
    name: "Freeze Alarm"
    initial_value: inactive
    # Rare — only trips on MAT < 38°F, which should never happen in normal ops.
    behavior:
      type: binary_toggle
      on_duration: 60
      off_duration: 172800   # once every ~2 days

  - type: binary-value
    instance: 2
    name: "Filter Alarm"
    initial_value: inactive
    behavior:
      type: binary_toggle
      on_duration: 300
      off_duration: 86400

  # --- Operating Mode ---
  - type: multi-state-value
    instance: 1
    name: "Operating Mode"
    initial_value: 2
    states:
      - "Off"
      - "Auto"
      - "Cool"
      - "Heat"
      - "Emergency Heat"
    behavior:
      type: weighted_choice
      choices:
        - value: 2
          weight: 50
        - value: 3
          weight: 25
        - value: 4
          weight: 15
        - value: 1
          weight: 8
        - value: 5
          weight: 2
      hold_min: 900
      hold_max: 3600
