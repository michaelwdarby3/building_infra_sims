name: "Generic Lighting Controller"
description: "4-zone lighting controller — dims with daylight, schedule follows occupancy"
equipment_class: "Lighting_Equipment"
device_id: 8001
port: 47808

# Daylight dimming per ASHRAE 90.1: lights drop toward 0% as daylight rises
# and occupancy is on. Overnight: 0%. Dawn/dusk: full. Noon: dimmed way down
# in daylit zones.

objects:
  # ── Zone dimming levels ──
  - object_type: analog-output
    instance: 1
    name: "Zone 1 Light Level"
    present_value: 80.0
    units: percent
    description: "Dimming command — perimeter zone with daylight harvesting"
    # Occupied = ~80% minus up to 60% daylight offset.
    behavior:
      type: world_value
      signal: solar_ghi
      scale: -0.07    # up to -70% dim at 1000 W/m²
      offset: 80.0
      noise: 2.0
      min: 10.0
      max: 100.0

  - object_type: analog-output
    instance: 2
    name: "Zone 2 Light Level"
    present_value: 90.0
    units: percent
    # Interior zone, no daylight harvesting — follows occupancy only.
    behavior:
      type: world_value
      signal: occupancy
      scale: 90.0
      offset: 5.0
      noise: 2.0
      min: 5.0
      max: 100.0

  - object_type: analog-output
    instance: 3
    name: "Zone 3 Light Level"
    present_value: 50.0
    units: percent
    # Perimeter zone with moderate daylight harvesting.
    behavior:
      type: world_value
      signal: solar_ghi
      scale: -0.04
      offset: 60.0
      noise: 2.0
      min: 5.0
      max: 100.0

  - object_type: analog-output
    instance: 4
    name: "Zone 4 Light Level"
    present_value: 0.0
    units: percent
    # Conference/break room — mostly off, on briefly during occupied hours.
    behavior:
      type: world_value
      signal: occupancy
      scale: 50.0
      offset: 0.0
      noise: 3.0
      min: 0.0
      max: 80.0

  # ── Occupancy sensors ──
  - object_type: binary-input
    instance: 1
    name: "Zone 1 Occupied"
    present_value: active
    behavior:
      type: occupancy_binary
      threshold: 0.1

  - object_type: binary-input
    instance: 2
    name: "Zone 2 Occupied"
    present_value: active
    behavior:
      type: occupancy_binary
      threshold: 0.1

  - object_type: binary-input
    instance: 3
    name: "Zone 3 Occupied"
    present_value: inactive
    # Slightly higher threshold = occupancy sensor trips later.
    behavior:
      type: occupancy_binary
      threshold: 0.3

  - object_type: binary-input
    instance: 4
    name: "Zone 4 Occupied"
    present_value: inactive
    # Intermittent-use zone — high threshold, mostly shows unoccupied.
    behavior:
      type: occupancy_binary
      threshold: 0.6

  # ── Daylight ──
  - object_type: analog-input
    instance: 1
    name: "Daylight Sensor"
    present_value: 450.0
    units: no-units
    description: "Lux — roughly 100 lux per W/m² GHI"
    behavior:
      type: world_value
      signal: solar_ghi
      scale: 0.8
      offset: 0.0
      noise: 20.0
      min: 0.0
      max: 1200.0

  # ── Control ──
  - object_type: multi-state-value
    instance: 1
    name: "Schedule Mode"
    present_value: 2
    description: "1=Off 2=Auto 3=Manual 4=Override"
    behavior:
      type: weighted_choice
      choices:
        - value: 2
          weight: 60
        - value: 3
          weight: 20
        - value: 1
          weight: 12
        - value: 4
          weight: 8
      hold_min: 1800
      hold_max: 7200

  - object_type: binary-value
    instance: 1
    name: "Override Active"
    present_value: inactive
    behavior:
      type: binary_toggle
      on_duration: 600
      off_duration: 7200
