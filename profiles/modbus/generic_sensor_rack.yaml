name: "Generic Sensor Rack"
description: "Multi-sensor module — temp/RH/CO2/pressure, outdoor signals from world"
equipment_class: "Sensor"
unit_id: 1
port: 10504

registers:
  input:
    # ── Zone 1 ──
    - address: 0
      name: "Zone 1 Temperature"
      datatype: FLOAT32
      unit: degF
      initial_value: 72.5
      behavior:
        type: random_walk
        center: 72.0
        step_size: 0.3
        min: 68.0
        max: 78.0

    - address: 2
      name: "Zone 1 Humidity"
      datatype: FLOAT32
      unit: "%RH"
      initial_value: 45.0
      behavior:
        type: random_walk
        center: 45.0
        step_size: 0.8
        min: 30.0
        max: 60.0

    - address: 4
      name: "Zone 1 CO2"
      datatype: FLOAT32
      unit: ppm
      initial_value: 450.0
      # Rises with occupancy — empty ≈ 420 ppm outdoor, peak occupancy ≈ 1100 ppm.
      behavior:
        type: world_value
        signal: occupancy
        scale: 700.0
        offset: 420.0
        noise: 20.0
        min: 400.0
        max: 1500.0

    # ── Zone 2 ──
    - address: 10
      name: "Zone 2 Temperature"
      datatype: FLOAT32
      unit: degF
      initial_value: 71.0
      behavior:
        type: random_walk
        center: 71.0
        step_size: 0.3
        min: 67.0
        max: 77.0

    - address: 12
      name: "Zone 2 Humidity"
      datatype: FLOAT32
      unit: "%RH"
      initial_value: 48.0
      behavior:
        type: random_walk
        center: 48.0
        step_size: 0.8
        min: 30.0
        max: 60.0

    - address: 14
      name: "Zone 2 CO2"
      datatype: FLOAT32
      unit: ppm
      initial_value: 480.0
      behavior:
        type: world_value
        signal: occupancy
        scale: 800.0
        offset: 430.0
        noise: 25.0
        min: 400.0
        max: 1600.0

    # ── Building pressure ──
    - address: 20
      name: "Building Static Pressure"
      datatype: FLOAT32
      unit: inWC
      initial_value: 0.05
      behavior:
        type: random_walk
        center: 0.05
        step_size: 0.01
        min: 0.0
        max: 0.12

    - address: 22
      name: "Outdoor Temperature"
      datatype: FLOAT32
      unit: degF
      initial_value: 55.0
      behavior:
        type: world_value
        signal: oat
        noise: 0.4

    - address: 24
      name: "Outdoor Humidity"
      datatype: FLOAT32
      unit: "%RH"
      initial_value: 55.0
      behavior:
        type: world_value
        signal: outdoor_rh
        noise: 1.5

  holding:
    - address: 0
      name: "Temp Offset Zone 1"
      datatype: FLOAT32
      unit: degF
      initial_value: 0.0

    - address: 2
      name: "Temp Offset Zone 2"
      datatype: FLOAT32
      unit: degF
      initial_value: 0.0

    - address: 4
      name: "CO2 Calibration Factor"
      datatype: FLOAT32
      unit: factor
      initial_value: 1.0
