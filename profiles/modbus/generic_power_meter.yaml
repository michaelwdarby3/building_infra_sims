name: "Generic Power Meter"
description: "3-phase power meter with typical Modbus register map"
equipment_class: "Electrical_Meter"
unit_id: 1
port: 10502

registers:
  holding:
    - address: 0
      name: "Voltage Phase A"
      datatype: FLOAT32
      unit: V
      initial_value: 120.1
      behavior:
        type: random_walk
        center: 120.0
        step_size: 1.5
        min: 115.0
        max: 125.0

    - address: 2
      name: "Voltage Phase B"
      datatype: FLOAT32
      unit: V
      initial_value: 120.0
      behavior:
        type: random_walk
        center: 120.0
        step_size: 1.5
        min: 115.0
        max: 125.0

    - address: 4
      name: "Voltage Phase C"
      datatype: FLOAT32
      unit: V
      initial_value: 119.9
      behavior:
        type: random_walk
        center: 120.0
        step_size: 1.5
        min: 115.0
        max: 125.0

    - address: 6
      name: "Current Phase A"
      datatype: FLOAT32
      unit: A
      initial_value: 15.2
      behavior:
        type: phased_sine_wave
        center: 15.0
        amplitude: 5.0
        period: 1800
        phase_offset: 0.0

    - address: 8
      name: "Current Phase B"
      datatype: FLOAT32
      unit: A
      initial_value: 14.8
      behavior:
        type: phased_sine_wave
        center: 15.0
        amplitude: 5.0
        period: 1800
        phase_offset: 2.094

    - address: 10
      name: "Current Phase C"
      datatype: FLOAT32
      unit: A
      initial_value: 15.0
      behavior:
        type: phased_sine_wave
        center: 15.0
        amplitude: 5.0
        period: 1800
        phase_offset: 4.189

    - address: 20
      name: "Power Factor"
      datatype: FLOAT32
      unit: PF
      initial_value: 0.95
      behavior:
        type: random_walk
        center: 0.95
        step_size: 0.03
        min: 0.82
        max: 1.0

    - address: 22
      name: "Frequency"
      datatype: FLOAT32
      unit: Hz
      initial_value: 60.0
      behavior:
        type: random_walk
        center: 60.0
        step_size: 0.025
        min: 59.90
        max: 60.10

    - address: 40
      name: "Total kW"
      datatype: FLOAT32
      unit: kW
      initial_value: 5.4
      behavior:
        type: sine_wave
        center: 5.0
        amplitude: 3.0
        period: 3600

    - address: 42
      name: "Total kVAR"
      datatype: FLOAT32
      unit: kVAR
      initial_value: 1.2
      behavior:
        type: sine_wave
        center: 1.0
        amplitude: 1.5
        period: 3600

    - address: 50
      name: "Total kWh"
      datatype: FLOAT32
      unit: kWh
      initial_value: 123456.0
      behavior:
        type: accumulator
        initial: 123456.0
        rate_per_second: 0.0015

  input:
    - address: 0
      name: "Device Status"
      datatype: UINT16
      unit: status
      initial_value: 1
      behavior:
        type: weighted_choice
        choices:
          - value: 1
            weight: 95
          - value: 0
            weight: 3
          - value: 2
            weight: 2
        hold_min: 3600
        hold_max: 14400

    - address: 1
      name: "Error Code"
      datatype: UINT16
      unit: code
      initial_value: 0
      behavior:
        type: weighted_choice
        choices:
          - value: 0
            weight: 95
          - value: 1
            weight: 3
          - value: 2
            weight: 2
        hold_min: 3600
        hold_max: 14400
