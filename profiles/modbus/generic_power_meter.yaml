name: "Generic Power Meter"
description: "3-phase power meter with typical Modbus register map — small-office profile"
equipment_class: "Electrical_Meter"
unit_id: 1
port: 10502

# Same small-office load model as the BACnet meter. See
# profiles/bacnet/generic_meter.yaml for the calibration rationale.

registers:
  holding:
    - address: 0
      name: "Voltage Phase A"
      datatype: FLOAT32
      unit: V
      initial_value: 120.1
      behavior:
        type: random_walk
        center: 120.0
        step_size: 0.5
        min: 117.0
        max: 123.0

    - address: 2
      name: "Voltage Phase B"
      datatype: FLOAT32
      unit: V
      initial_value: 120.0
      behavior:
        type: random_walk
        center: 120.0
        step_size: 0.5
        min: 117.0
        max: 123.0

    - address: 4
      name: "Voltage Phase C"
      datatype: FLOAT32
      unit: V
      initial_value: 119.9
      behavior:
        type: random_walk
        center: 120.0
        step_size: 0.5
        min: 117.0
        max: 123.0

    - address: 6
      name: "Current Phase A"
      datatype: FLOAT32
      unit: A
      initial_value: 18.0
      behavior:
        type: phased_sine_wave
        center: 18.0
        amplitude: 8.0
        period: 86400
        phase_offset: 0.0

    - address: 8
      name: "Current Phase B"
      datatype: FLOAT32
      unit: A
      initial_value: 17.5
      behavior:
        type: phased_sine_wave
        center: 18.0
        amplitude: 8.0
        period: 86400
        phase_offset: 2.094

    - address: 10
      name: "Current Phase C"
      datatype: FLOAT32
      unit: A
      initial_value: 18.2
      behavior:
        type: phased_sine_wave
        center: 18.0
        amplitude: 8.0
        period: 86400
        phase_offset: 4.189

    - address: 20
      name: "Power Factor"
      datatype: FLOAT32
      unit: PF
      initial_value: 0.92
      behavior:
        type: random_walk
        center: 0.92
        step_size: 0.01
        min: 0.85
        max: 0.98

    - address: 22
      name: "Frequency"
      datatype: FLOAT32
      unit: Hz
      initial_value: 60.0
      behavior:
        type: random_walk
        center: 60.0
        step_size: 0.015
        min: 59.90
        max: 60.10

    - address: 40
      name: "Total kW"
      datatype: FLOAT32
      unit: kW
      initial_value: 5.0
      behavior:
        type: world_value
        signal: occupancy
        scale: 7.0
        offset: 2.0
        noise: 0.25
        min: 1.5
        max: 10.0

    - address: 42
      name: "Total kVAR"
      datatype: FLOAT32
      unit: kVAR
      initial_value: 1.2
      behavior:
        type: world_value
        signal: occupancy
        scale: 1.5
        offset: 0.5
        noise: 0.15
        min: 0.3
        max: 2.5

    - address: 50
      name: "Total kWh"
      datatype: FLOAT32
      unit: kWh
      initial_value: 123456.0
      behavior:
        type: accumulator
        initial: 123456.0
        rate_per_second: 0.002

  input:
    - address: 0
      name: "Device Status"
      datatype: UINT16
      unit: status
      initial_value: 1
      behavior:
        type: weighted_choice
        choices:
          - value: 1
            weight: 95
          - value: 0
            weight: 3
          - value: 2
            weight: 2
        hold_min: 3600
        hold_max: 14400

    - address: 1
      name: "Error Code"
      datatype: UINT16
      unit: code
      initial_value: 0
      behavior:
        type: weighted_choice
        choices:
          - value: 0
            weight: 95
          - value: 1
            weight: 3
          - value: 2
            weight: 2
        hold_min: 3600
        hold_max: 14400
