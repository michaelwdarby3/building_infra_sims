name: "Generic Pump"
description: "Variable speed centrifugal pump with pressure and flow monitoring"
unit_id: 1
port: 10522

registers:
  holding:
    - address: 0
      name: "Speed CMD"
      datatype: FLOAT32
      unit: "%"
      initial_value: 70.0
      behavior:
        type: schedule
        schedule:
          "06:00": 80.0
          "12:00": 90.0
          "18:00": 70.0
          "22:00": 50.0
        default: 50.0

    - address: 2
      name: "Run CMD"
      datatype: UINT16
      unit: status
      initial_value: 1

    - address: 3
      name: "Pressure Setpoint"
      datatype: FLOAT32
      unit: PSI
      initial_value: 25.0

  input:
    - address: 0
      name: "Status"
      datatype: UINT16
      unit: status
      initial_value: 1
      behavior:
        type: weighted_choice
        choices:
          - value: 1
            weight: 85
          - value: 2
            weight: 8
          - value: 0
            weight: 7
        hold_min: 600
        hold_max: 3600

    - address: 1
      name: "Speed Feedback"
      datatype: FLOAT32
      unit: "%"
      initial_value: 68.0
      behavior:
        type: sine_wave
        center: 68.0
        amplitude: 14.0
        period: 3600

    - address: 3
      name: "Flow Rate"
      datatype: FLOAT32
      unit: GPM
      initial_value: 120.0
      behavior:
        type: sine_wave
        center: 120.0
        amplitude: 40.0
        period: 3600

    - address: 5
      name: "Differential Pressure"
      datatype: FLOAT32
      unit: PSI
      initial_value: 25.0
      behavior:
        type: random_walk
        center: 25.0
        step_size: 2.0
        min: 15.0
        max: 35.0

    - address: 7
      name: "Suction Pressure"
      datatype: FLOAT32
      unit: PSI
      initial_value: 12.0
      behavior:
        type: random_walk
        center: 12.0
        step_size: 1.0
        min: 6.0
        max: 18.0

    - address: 9
      name: "Discharge Pressure"
      datatype: FLOAT32
      unit: PSI
      initial_value: 37.0
      behavior:
        type: random_walk
        center: 37.0
        step_size: 2.0
        min: 25.0
        max: 50.0

    - address: 11
      name: "Motor Current"
      datatype: FLOAT32
      unit: A
      initial_value: 18.0
      behavior:
        type: sine_wave
        center: 18.0
        amplitude: 6.0
        period: 3600

    - address: 13
      name: "Motor Temp"
      datatype: FLOAT32
      unit: degF
      initial_value: 155.0
      behavior:
        type: random_walk
        center: 155.0
        step_size: 5.0
        min: 110.0
        max: 210.0

    - address: 15
      name: "Run Hours"
      datatype: FLOAT32
      unit: hours
      initial_value: 12000.0
      behavior:
        type: accumulator
        initial: 12000.0
        rate_per_second: 0.000278
