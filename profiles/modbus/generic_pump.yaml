name: "Generic Pump"
description: "Variable speed centrifugal pump — speed follows occupancy, ΔP preserved"
equipment_class: "Pump"
unit_id: 1
port: 10522

# Preserves test_discharge_gt_suction_on_average: discharge center 37 PSI,
# suction center 12 PSI, independent random walks.

registers:
  holding:
    - address: 0
      name: "Speed CMD"
      datatype: FLOAT32
      unit: "%"
      initial_value: 70.0
      behavior:
        type: world_value
        signal: occupancy
        scale: 60.0
        offset: 30.0
        noise: 2.0
        min: 30.0
        max: 100.0

    - address: 2
      name: "Run CMD"
      datatype: UINT16
      unit: status
      initial_value: 1

    - address: 3
      name: "Pressure Setpoint"
      datatype: FLOAT32
      unit: PSI
      initial_value: 25.0

  input:
    - address: 0
      name: "Status"
      datatype: UINT16
      unit: status
      initial_value: 1
      behavior:
        type: weighted_choice
        choices:
          - value: 1
            weight: 85
          - value: 2
            weight: 8
          - value: 0
            weight: 7
        hold_min: 600
        hold_max: 3600

    - address: 1
      name: "Speed Feedback"
      datatype: FLOAT32
      unit: "%"
      initial_value: 68.0
      behavior:
        type: tracks
        source: "Speed CMD"
        bias: -2.0
        noise: 1.0
        lag_factor: 0.4

    - address: 3
      name: "Flow Rate"
      datatype: FLOAT32
      unit: GPM
      initial_value: 120.0
      # Flow scales with speed, which scales with occupancy.
      behavior:
        type: world_value
        signal: occupancy
        scale: 100.0
        offset: 60.0
        noise: 4.0
        min: 40.0
        max: 180.0

    - address: 5
      name: "Differential Pressure"
      datatype: FLOAT32
      unit: PSI
      initial_value: 25.0
      behavior:
        type: random_walk
        center: 25.0
        step_size: 1.0
        min: 18.0
        max: 32.0

    - address: 7
      name: "Suction Pressure"
      datatype: FLOAT32
      unit: PSI
      initial_value: 12.0
      behavior:
        type: random_walk
        center: 12.0
        step_size: 0.5
        min: 8.0
        max: 16.0

    - address: 9
      name: "Discharge Pressure"
      datatype: FLOAT32
      unit: PSI
      initial_value: 37.0
      behavior:
        type: random_walk
        center: 37.0
        step_size: 1.2
        min: 28.0
        max: 48.0

    - address: 11
      name: "Motor Current"
      datatype: FLOAT32
      unit: A
      initial_value: 18.0
      behavior:
        type: world_value
        signal: occupancy
        scale: 10.0
        offset: 12.0
        noise: 1.0
        min: 8.0
        max: 26.0

    - address: 13
      name: "Motor Temp"
      datatype: FLOAT32
      unit: degF
      initial_value: 155.0
      behavior:
        type: random_walk
        center: 155.0
        step_size: 2.0
        min: 130.0
        max: 185.0

    - address: 15
      name: "Run Hours"
      datatype: FLOAT32
      unit: hours
      initial_value: 12000.0
      behavior:
        type: accumulator
        initial: 12000.0
        rate_per_second: 0.000278
