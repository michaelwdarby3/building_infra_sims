name: "Generic HVAC Controller"
description: "Zone HVAC controller — world-driven zone temp, deadband heat/cool (mutually exclusive)"
equipment_class: "HVAC_Equipment"
unit_id: 1
port: 10510

# Keeps the `deadband_switch` behavior on Heating/Cooling outputs so they
# stay mutually exclusive (test_no_simultaneous_heat_and_cool). Upstream
# sensors and commands follow world signals.

registers:
  holding:
    - address: 0
      name: "Zone Temperature"
      datatype: FLOAT32
      unit: degF
      initial_value: 72.0
      # Deterministic sine around setpoint — lets deadband_switch on
      # Heating/Cooling Output stay mutually exclusive. A random walk
      # here breaks test_no_simultaneous_heat_and_cool because the walk
      # advances between the two deadband reads.
      behavior:
        type: sine_wave
        center: 72.0
        amplitude: 2.0
        period: 7200

    - address: 2
      name: "Zone Temp Setpoint"
      datatype: FLOAT32
      unit: degF
      initial_value: 72.0

    - address: 4
      name: "Zone Humidity"
      datatype: FLOAT32
      unit: "%RH"
      initial_value: 45.0
      behavior:
        type: random_walk
        center: 45.0
        step_size: 0.8
        min: 30.0
        max: 60.0

    - address: 6
      name: "Damper Position"
      datatype: FLOAT32
      unit: "%"
      initial_value: 50.0
      behavior:
        type: world_value
        signal: cooling_demand
        scale: 75.0
        offset: 25.0
        noise: 2.0
        min: 25.0
        max: 100.0

    - address: 8
      name: "Fan Speed"
      datatype: FLOAT32
      unit: "%"
      initial_value: 60.0
      behavior:
        type: world_value
        signal: occupancy
        scale: 60.0
        offset: 30.0
        noise: 2.0
        min: 30.0
        max: 100.0

    - address: 10
      name: "Heating Output"
      datatype: FLOAT32
      unit: "%"
      initial_value: 0.0
      # Deadband switch: active only when Zone Temperature < 71°F.
      # Preserves test_no_simultaneous_heat_and_cool invariant.
      behavior:
        type: deadband_switch
        sources: ["Zone Temperature"]
        threshold: 71.0
        above: false
        output_value: 75.0

    - address: 12
      name: "Cooling Output"
      datatype: FLOAT32
      unit: "%"
      initial_value: 0.0
      behavior:
        type: deadband_switch
        sources: ["Zone Temperature"]
        threshold: 73.0
        above: true
        output_value: 80.0

    - address: 14
      name: "Mode"
      datatype: UINT16
      unit: mode
      initial_value: 2
      behavior:
        type: schedule
        schedule:
          "06:00": 2
          "18:00": 3
          "22:00": 1
        default: 1

    - address: 15
      name: "Occupancy"
      datatype: UINT16
      unit: status
      initial_value: 1
      behavior:
        type: schedule
        schedule:
          "07:00": 1
          "19:00": 0
        default: 0

    - address: 16
      name: "Supply Air Temp"
      datatype: FLOAT32
      unit: degF
      initial_value: 55.0
      behavior:
        type: conditional_on_oat
        bands:
          - oat_below: 45
            value: 85.0
          - oat_below: 60
            value: 65.0
          - oat_below: 200
            value: 55.0
        noise: 1.5

  input:
    - address: 0
      name: "Controller Status"
      datatype: UINT16
      unit: status
      initial_value: 1
      behavior:
        type: weighted_choice
        choices:
          - value: 1
            weight: 90
          - value: 2
            weight: 5
          - value: 0
            weight: 5
        hold_min: 1800
        hold_max: 7200

    - address: 1
      name: "Alarm Code"
      datatype: UINT16
      unit: code
      initial_value: 0
      behavior:
        type: weighted_choice
        choices:
          - value: 0
            weight: 92
          - value: 1
            weight: 3
          - value: 2
            weight: 3
          - value: 3
            weight: 2
        hold_min: 3600
        hold_max: 14400
