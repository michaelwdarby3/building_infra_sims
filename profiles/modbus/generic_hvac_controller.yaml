name: "Generic HVAC Controller"
description: "Zone-level HVAC controller with temp, humidity, damper, and fan"
equipment_class: "HVAC_Equipment"
unit_id: 1
port: 10510

registers:
  holding:
    - address: 0
      name: "Zone Temperature"
      datatype: FLOAT32
      unit: degF
      initial_value: 72.0
      behavior:
        type: sine_wave
        center: 72.0
        amplitude: 6.0
        period: 7200

    - address: 2
      name: "Zone Temp Setpoint"
      datatype: FLOAT32
      unit: degF
      initial_value: 72.0

    - address: 4
      name: "Zone Humidity"
      datatype: FLOAT32
      unit: "%RH"
      initial_value: 45.0
      behavior:
        type: random_walk
        center: 45.0
        step_size: 2.5
        min: 25.0
        max: 70.0

    - address: 6
      name: "Damper Position"
      datatype: FLOAT32
      unit: "%"
      initial_value: 50.0
      behavior:
        type: sine_wave
        center: 50.0
        amplitude: 30.0
        period: 3600

    - address: 8
      name: "Fan Speed"
      datatype: FLOAT32
      unit: "%"
      initial_value: 60.0
      behavior:
        type: sine_wave
        center: 60.0
        amplitude: 25.0
        period: 3600

    - address: 10
      name: "Heating Output"
      datatype: FLOAT32
      unit: "%"
      initial_value: 0.0
      behavior:
        type: deadband_switch
        sources: ["Zone Temperature"]
        threshold: 71.0
        above: false
        output_value: 75.0

    - address: 12
      name: "Cooling Output"
      datatype: FLOAT32
      unit: "%"
      initial_value: 0.0
      behavior:
        type: deadband_switch
        sources: ["Zone Temperature"]
        threshold: 73.0
        above: true
        output_value: 80.0

    - address: 14
      name: "Mode"
      datatype: UINT16
      unit: mode
      initial_value: 2
      behavior:
        type: schedule
        schedule:
          "06:00": 2
          "18:00": 3
          "22:00": 1
        default: 1

    - address: 15
      name: "Occupancy"
      datatype: UINT16
      unit: status
      initial_value: 1
      behavior:
        type: schedule
        schedule:
          "07:00": 1
          "19:00": 0
        default: 0

    - address: 16
      name: "Supply Air Temp"
      datatype: FLOAT32
      unit: degF
      initial_value: 55.0
      behavior:
        type: random_walk
        center: 55.0
        step_size: 2.5
        min: 45.0
        max: 68.0

  input:
    - address: 0
      name: "Controller Status"
      datatype: UINT16
      unit: status
      initial_value: 1
      behavior:
        type: weighted_choice
        choices:
          - value: 1
            weight: 90
          - value: 2
            weight: 5
          - value: 0
            weight: 5
        hold_min: 1800
        hold_max: 7200

    - address: 1
      name: "Alarm Code"
      datatype: UINT16
      unit: code
      initial_value: 0
      behavior:
        type: weighted_choice
        choices:
          - value: 0
            weight: 92
          - value: 1
            weight: 3
          - value: 2
            weight: 3
          - value: 3
            weight: 2
        hold_min: 3600
        hold_max: 14400
