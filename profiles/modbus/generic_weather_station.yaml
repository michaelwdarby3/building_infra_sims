name: "Generic Weather Station"
description: "Outdoor weather monitoring station with temp, humidity, wind, and solar"
unit_id: 1
port: 10512

registers:
  input:
    - address: 0
      name: "Outdoor Temperature"
      datatype: FLOAT32
      unit: degF
      initial_value: 78.0
      behavior:
        type: sine_wave
        center: 78.0
        amplitude: 15.0
        period: 86400

    - address: 2
      name: "Outdoor Humidity"
      datatype: FLOAT32
      unit: "%RH"
      initial_value: 55.0
      behavior:
        type: sine_wave
        center: 55.0
        amplitude: 20.0
        period: 86400

    - address: 4
      name: "Barometric Pressure"
      datatype: FLOAT32
      unit: inHg
      initial_value: 29.92
      behavior:
        type: random_walk
        center: 29.92
        step_size: 0.02
        min: 29.50
        max: 30.50

    - address: 6
      name: "Wind Speed"
      datatype: FLOAT32
      unit: mph
      initial_value: 8.0
      behavior:
        type: random_walk
        center: 8.0
        step_size: 2.0
        min: 0.0
        max: 35.0

    - address: 8
      name: "Wind Direction"
      datatype: FLOAT32
      unit: deg
      initial_value: 180.0
      behavior:
        type: random_walk
        center: 180.0
        step_size: 15.0
        min: 0.0
        max: 360.0

    - address: 10
      name: "Rain Rate"
      datatype: FLOAT32
      unit: in/hr
      initial_value: 0.0
      behavior:
        type: random_walk
        center: 0.0
        step_size: 0.02
        min: 0.0
        max: 0.5

    - address: 12
      name: "Solar Radiation"
      datatype: FLOAT32
      unit: W/m2
      initial_value: 450.0
      behavior:
        type: sine_wave
        center: 400.0
        amplitude: 400.0
        period: 86400

    - address: 14
      name: "UV Index"
      datatype: FLOAT32
      unit: index
      initial_value: 5.0
      behavior:
        type: sine_wave
        center: 4.0
        amplitude: 4.0
        period: 86400

    - address: 16
      name: "Dew Point"
      datatype: FLOAT32
      unit: degF
      initial_value: 60.0
      behavior:
        type: dew_point
        sources: ["Outdoor Temperature", "Outdoor Humidity"]

    - address: 18
      name: "Wet Bulb Temp"
      datatype: FLOAT32
      unit: degF
      initial_value: 65.0
      behavior:
        type: wet_bulb
        sources: ["Outdoor Temperature", "Outdoor Humidity"]
