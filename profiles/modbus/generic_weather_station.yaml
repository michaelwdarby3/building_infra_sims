name: "Generic Weather Station"
description: "Outdoor weather monitoring — all signals driven by Boston WorldState"
equipment_class: "Weather_Station"
unit_id: 1
port: 10512

registers:
  input:
    - address: 0
      name: "Outdoor Temperature"
      datatype: FLOAT32
      unit: degF
      initial_value: 55.0
      behavior:
        type: world_value
        signal: oat
        noise: 0.3

    - address: 2
      name: "Outdoor Humidity"
      datatype: FLOAT32
      unit: "%RH"
      initial_value: 55.0
      behavior:
        type: world_value
        signal: outdoor_rh
        noise: 1.5

    - address: 4
      name: "Barometric Pressure"
      datatype: FLOAT32
      unit: inHg
      initial_value: 29.92
      behavior:
        type: random_walk
        center: 29.92
        step_size: 0.02
        min: 29.40
        max: 30.60

    - address: 6
      name: "Wind Speed"
      datatype: FLOAT32
      unit: mph
      initial_value: 8.0
      behavior:
        type: random_walk
        center: 8.0
        step_size: 2.0
        min: 0.0
        max: 35.0

    - address: 8
      name: "Wind Direction"
      datatype: FLOAT32
      unit: deg
      initial_value: 180.0
      behavior:
        type: random_walk
        center: 180.0
        step_size: 10.0
        min: 0.0
        max: 360.0

    - address: 10
      name: "Rain Rate"
      datatype: FLOAT32
      unit: in/hr
      initial_value: 0.0
      behavior:
        type: random_walk
        center: 0.0
        step_size: 0.015
        min: 0.0
        max: 0.3

    - address: 12
      name: "Solar Radiation"
      datatype: FLOAT32
      unit: W/m2
      initial_value: 0.0
      behavior:
        type: world_value
        signal: solar_ghi
        noise: 15.0
        min: 0.0

    - address: 14
      name: "UV Index"
      datatype: FLOAT32
      unit: index
      initial_value: 0.0
      # UV rises with solar — ~1 UV per 100 W/m² GHI.
      behavior:
        type: world_value
        signal: solar_ghi
        scale: 0.01
        noise: 0.2
        min: 0.0
        max: 11.0

    - address: 16
      name: "Dew Point"
      datatype: FLOAT32
      unit: degF
      initial_value: 45.0
      behavior:
        type: dew_point
        sources: ["Outdoor Temperature", "Outdoor Humidity"]

    - address: 18
      name: "Wet Bulb Temp"
      datatype: FLOAT32
      unit: degF
      initial_value: 50.0
      behavior:
        type: wet_bulb
        sources: ["Outdoor Temperature", "Outdoor Humidity"]
