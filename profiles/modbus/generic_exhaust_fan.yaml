name: "Generic Exhaust Fan"
description: "Variable speed exhaust fan with pressure control"
unit_id: 1
port: 10520

registers:
  holding:
    - address: 0
      name: "Speed CMD"
      datatype: FLOAT32
      unit: "%"
      initial_value: 60.0
      behavior:
        type: sine_wave
        center: 60.0
        amplitude: 20.0
        period: 3600

    - address: 2
      name: "Mode"
      datatype: UINT16
      unit: mode
      initial_value: 2
      behavior:
        type: schedule
        schedule:
          "06:00": 2
          "20:00": 1
        default: 0

  input:
    - address: 0
      name: "Motor Status"
      datatype: UINT16
      unit: status
      initial_value: 1

    - address: 1
      name: "Speed Feedback"
      datatype: FLOAT32
      unit: "%"
      initial_value: 58.0
      behavior:
        type: sine_wave
        center: 58.0
        amplitude: 18.0
        period: 3600

    - address: 3
      name: "Airflow"
      datatype: FLOAT32
      unit: CFM
      initial_value: 2500.0
      behavior:
        type: sine_wave
        center: 2500.0
        amplitude: 800.0
        period: 3600

    - address: 5
      name: "Static Pressure"
      datatype: FLOAT32
      unit: inWC
      initial_value: 0.75
      behavior:
        type: random_walk
        center: 0.75
        step_size: 0.05
        min: 0.3
        max: 1.2

    - address: 7
      name: "Motor Current"
      datatype: FLOAT32
      unit: A
      initial_value: 8.5
      behavior:
        type: sine_wave
        center: 8.5
        amplitude: 3.0
        period: 3600

    - address: 9
      name: "Motor Temp"
      datatype: FLOAT32
      unit: degF
      initial_value: 145.0
      behavior:
        type: random_walk
        center: 145.0
        step_size: 2.0
        min: 100.0
        max: 185.0

    - address: 11
      name: "Run Hours"
      datatype: FLOAT32
      unit: hours
      initial_value: 8500.0
      behavior:
        type: accumulator
        initial: 8500.0
        rate_per_second: 0.000278

    - address: 13
      name: "Fault Code"
      datatype: UINT16
      unit: code
      initial_value: 0
