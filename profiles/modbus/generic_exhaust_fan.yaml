name: "Generic Exhaust Fan"
description: "Variable speed exhaust fan — speed/flow follow occupancy, static pressure stays in control band"
equipment_class: "Exhaust_Fan"
unit_id: 1
port: 10520

# Restroom/kitchen/general exhaust fan. Turns on during occupied hours,
# modulates with occupancy load. Static pressure control keeps it
# near setpoint regardless of flow.

registers:
  holding:
    - address: 0
      name: "Speed CMD"
      datatype: FLOAT32
      unit: "%"
      initial_value: 60.0
      behavior:
        type: world_value
        signal: occupancy
        scale: 55.0
        offset: 30.0
        noise: 2.0
        min: 30.0
        max: 90.0

    - address: 2
      name: "Mode"
      datatype: UINT16
      unit: mode
      initial_value: 2
      behavior:
        type: schedule
        schedule:
          "06:00": 2
          "20:00": 1
        default: 0

  input:
    - address: 0
      name: "Motor Status"
      datatype: UINT16
      unit: status
      initial_value: 1
      behavior:
        type: weighted_choice
        choices:
          - value: 1
            weight: 85
          - value: 2
            weight: 8
          - value: 0
            weight: 7
        hold_min: 600
        hold_max: 3600

    - address: 1
      name: "Speed Feedback"
      datatype: FLOAT32
      unit: "%"
      initial_value: 58.0
      # Tracks Speed CMD with small lag and bias (VFD feedback).
      behavior:
        type: tracks
        source: "Speed CMD"
        bias: -2.0
        noise: 1.0
        lag_factor: 0.4

    - address: 3
      name: "Airflow"
      datatype: FLOAT32
      unit: CFM
      initial_value: 2500.0
      # Flow scales with occupancy (fan law; speed ∝ occupancy).
      behavior:
        type: world_value
        signal: occupancy
        scale: 2000.0
        offset: 1200.0
        noise: 60.0
        min: 1000.0
        max: 3500.0

    - address: 5
      name: "Static Pressure"
      datatype: FLOAT32
      unit: inWC
      initial_value: 0.75
      # Pressure control keeps it near setpoint; small wander.
      behavior:
        type: random_walk
        center: 0.75
        step_size: 0.05
        min: 0.5
        max: 1.1

    - address: 7
      name: "Motor Current"
      datatype: FLOAT32
      unit: A
      initial_value: 8.5
      behavior:
        type: world_value
        signal: occupancy
        scale: 4.0
        offset: 6.0
        noise: 0.3
        min: 5.0
        max: 12.0

    - address: 9
      name: "Motor Temp"
      datatype: FLOAT32
      unit: degF
      initial_value: 145.0
      behavior:
        type: random_walk
        center: 145.0
        step_size: 2.0
        min: 120.0
        max: 170.0

    - address: 11
      name: "Run Hours"
      datatype: FLOAT32
      unit: hours
      initial_value: 8500.0
      behavior:
        type: accumulator
        initial: 8500.0
        rate_per_second: 0.000278

    - address: 13
      name: "Fault Code"
      datatype: UINT16
      unit: code
      initial_value: 0
      behavior:
        type: weighted_choice
        choices:
          - value: 0
            weight: 95
          - value: 1
            weight: 3
          - value: 2
            weight: 2
        hold_min: 3600
        hold_max: 14400
