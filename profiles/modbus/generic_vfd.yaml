name: "Generic VFD"
description: "Variable Frequency Drive — load tracks occupancy, thermal rises with load"
equipment_class: "VFD"
unit_id: 1
port: 10503

# 480V 3-phase drive on a medium-sized pump/fan motor. Frequency and
# current follow occupancy; heatsink/motor temp rise with sustained load.

registers:
  holding:
    # ── Speed/Frequency ──
    - address: 0
      name: "Output Frequency"
      datatype: FLOAT32
      unit: Hz
      initial_value: 45.0
      behavior:
        type: world_value
        signal: occupancy
        scale: 30.0
        offset: 25.0
        noise: 0.5
        min: 25.0
        max: 60.0

    - address: 2
      name: "Speed Reference"
      datatype: FLOAT32
      unit: Hz
      initial_value: 45.0
      behavior:
        type: world_value
        signal: occupancy
        scale: 30.0
        offset: 25.0
        noise: 0.2

    - address: 4
      name: "Motor Speed RPM"
      datatype: FLOAT32
      unit: RPM
      initial_value: 1350.0
      # 4-pole motor: RPM ≈ 30 × Hz.
      behavior:
        type: world_value
        signal: occupancy
        scale: 900.0
        offset: 750.0
        noise: 10.0
        min: 750.0
        max: 1800.0

    # ── Electrical ──
    - address: 10
      name: "Output Current"
      datatype: FLOAT32
      unit: A
      initial_value: 12.5
      behavior:
        type: world_value
        signal: occupancy
        scale: 8.0
        offset: 7.0
        noise: 0.5
        min: 5.0
        max: 20.0

    - address: 12
      name: "Output Voltage"
      datatype: FLOAT32
      unit: V
      initial_value: 380.0
      # 480V nominal, runs a bit under at partial speed.
      behavior:
        type: random_walk
        center: 460.0
        step_size: 3.0
        min: 440.0
        max: 485.0

    - address: 14
      name: "Output Power kW"
      datatype: FLOAT32
      unit: kW
      initial_value: 5.5
      behavior:
        type: world_value
        signal: occupancy
        scale: 4.0
        offset: 2.0
        noise: 0.3
        min: 1.5
        max: 9.0

    - address: 16
      name: "DC Bus Voltage"
      datatype: FLOAT32
      unit: V
      initial_value: 540.0
      behavior:
        type: random_walk
        center: 650.0
        step_size: 4.0
        min: 620.0
        max: 680.0

    # ── Thermal ──
    - address: 20
      name: "Heatsink Temperature"
      datatype: FLOAT32
      unit: degC
      initial_value: 45.0
      # Heatsink warms when drive is carrying load.
      behavior:
        type: world_value
        signal: occupancy
        scale: 20.0
        offset: 30.0
        noise: 1.5
        min: 25.0
        max: 70.0

    - address: 22
      name: "Motor Temperature"
      datatype: FLOAT32
      unit: degC
      initial_value: 55.0
      behavior:
        type: world_value
        signal: occupancy
        scale: 25.0
        offset: 40.0
        noise: 2.0
        min: 30.0
        max: 85.0

    # ── Counters ──
    - address: 30
      name: "Run Hours"
      datatype: FLOAT32
      unit: hrs
      initial_value: 12500.0
      behavior:
        type: accumulator
        initial: 12500.0
        rate_per_second: 0.000278

    - address: 32
      name: "Energy kWh"
      datatype: FLOAT32
      unit: kWh
      initial_value: 87500.0
      behavior:
        type: accumulator
        initial: 87500.0
        rate_per_second: 0.0014

  input:
    - address: 0
      name: "Drive Status Word"
      datatype: UINT16
      unit: status
      initial_value: 7
      behavior:
        type: weighted_choice
        choices:
          - value: 7
            weight: 85
          - value: 3
            weight: 8
          - value: 1
            weight: 5
          - value: 0
            weight: 2
        hold_min: 600
        hold_max: 3600

    - address: 1
      name: "Fault Code"
      datatype: UINT16
      unit: code
      initial_value: 0
      behavior:
        type: weighted_choice
        choices:
          - value: 0
            weight: 95
          - value: 2
            weight: 2
          - value: 4
            weight: 2
          - value: 8
            weight: 1
        hold_min: 1800
        hold_max: 7200

    - address: 2
      name: "Warning Code"
      datatype: UINT16
      unit: code
      initial_value: 0
      behavior:
        type: weighted_choice
        choices:
          - value: 0
            weight: 85
          - value: 1
            weight: 5
          - value: 2
            weight: 5
          - value: 4
            weight: 5
        hold_min: 900
        hold_max: 3600
